<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristi Dodaj</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/" type="image/x-icon">
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }
        body.dark-mode {
            background: linear-gradient(to right, #2c2c2c, #6e6e6e);
            color: white;
        }
        body.light-mode {
            background: linear-gradient(to right, #f0f0f0, #ffffff);
            color: #333;
        }
        .container {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: 0.5s;
            padding: 20px;
            max-width: 100%;
            box-sizing: border-box;
        }
        .typing-container {
            display: inline-flex;
            align-items: center;
            position: relative;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            padding: 0;
            font-weight: 700;
            line-height: 1;
        }
        .cursor {
            width: 3px;
            height: 2.5rem;
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }
        .dark-mode .cursor {
            background-color: white;
        }
        .light-mode .cursor {
            background-color: #333;
        }
        p {
            font-size: 1rem;
            font-weight: 400;
            margin-top: 1rem;
        }
        .sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            display: flex;
            align-items: center;
        }
        .sidebar a {
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sidebar img {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }
        .sidebar a:first-child img {
            width: 30px;
            height: 30px;
        }
        .sidebar img:hover {
            transform: scale(1.1);
        }
        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
            animation-delay: 0.8s;
            z-index: 1000;
        }
        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
            animation-delay: 3.3s;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 1.5rem;
        }
        .button-link {
            display: inline-block;
            font-size: 1rem;
            text-decoration: none;
            color: white;
            background-color: transparent;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .button-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }
        .button-link:hover {
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .button-link:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }
        .light-mode .button-link {
            color: #333;
            border-color: #333;
        }
        .light-mode .button-link::before {
            background: rgba(0, 0, 0, 0.1);
        }
        .light-mode .button-link:hover {
            color: #333;
        }
        .line-top, .line-bottom {
            display: none;
        }
        @media (max-width: 767px) {
            .sidebar {
                left: 15px;
                top: 15px;
            }
            .sidebar a {
                margin-right: 15px;
            }
            .sidebar img {
                width: 26px;
                height: 26px;
            }
            .sidebar a:first-child img {
                width: 32px;
                height: 32px;
            }
        }

        @media (min-width: 768px) {
            .sidebar {
                left: 46px;
                top: 50%;
                transform: translateY(-50%);
                flex-direction: column;
                height: 180px;
                justify-content: space-between;
            }
            .sidebar a {
                margin-right: 0;
                margin-bottom: 10px;
            }
            .sidebar img {
                width: 30px;
                height: 30px;
            }
            .sidebar a:first-child img {
                width: 40px;
                height: 40px;
            }
            h1 {
                font-size: 3rem;
            }
            .cursor {
                height: 3rem;
            }
            p {
                font-size: 1.2rem;
                max-width: 600px;
                margin-left: auto;
                margin-right: auto;
            }
            .container {
                padding-left: 100px;
                padding-right: 100px;
            }
            .line-top, .line-bottom {
                display: block;
                width: 2px;
                position: fixed;
                left: 64px;
                animation: pulse 2s infinite;
            }
            .dark-mode .line-top, .dark-mode .line-bottom {
                background-color: white;
            }
            .light-mode .line-top, .light-mode .line-bottom {
                background-color: #333;
            }
            .line-top {
                top: 0;
                height: calc(50% - 110px);
            }
            .line-bottom {
                bottom: 0;
                height: calc(50% - 110px);
            }
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="line-top"></div>
    <div class="line-bottom"></div>
    <div class="theme-toggle" id="theme-toggle-btn">☽</div>
    <div class="sidebar">
        <a href="https://www.linkedin.com/in/kristidodaj" target="_blank" rel="noopener noreferrer">
            <img src="/ln-dark.png" alt="LinkedIn" id="linkedin-icon">
        </a>
        <a href="https://github.com/KristiDodaj" target="_blank" rel="noopener noreferrer">
            <img src="/github-dark.png" alt="GitHub" id="github-icon">
        </a>
        <a href="https://drive.google.com/file/d/1xif0ktv2S3F8BmwCBlR4V4Vx8qNQ95S3/view?usp=sharing" target="_blank">
            <img src="/resume-dark.png" alt="Resume" id="resume-icon">
        </a>
    </div>
    <div class="container">
        <div class="typing-container">
            <h1 id="typed-name"></h1><span class="cursor"></span>
        </div>
        <p>Hi there 👋 I'm a CS student @University of Toronto, navigating the exciting world of software engineering and tech. Curious about what I'm up to? Check out my portfolio or shoot me an email or LinkedIn message!</p>
        <div class="button-container">
            <a href="projects.html" class="button-link">VIEW MY PROJECTS</a>
            <a href="experience.html" class="button-link">VIEW MY EXPERIENCE</a>
        </div>
    </div>
    <div class="footer">
        Made with <span id="heart">🤍</span> by Kristi Dodaj
    </div>
    <script>
        const name = "KRISTI DODAJ";
        const typedName = document.getElementById('typed-name');
        let i = 0;

        function typeWriter() {
            if (i < name.length) {
                typedName.innerHTML += name.charAt(i);
                i++;
                setTimeout(typeWriter, 200);
            }
        }

        setTimeout(typeWriter, 1300);

        const body = document.body;
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const linkedinIcon = document.getElementById('linkedin-icon');
        const githubIcon = document.getElementById('github-icon');
        const resumeIcon = document.getElementById('resume-icon');
        const heart = document.getElementById('heart');

        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.className = savedTheme;
        } else {
            body.className = 'dark-mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            body.classList.toggle('light-mode');
            updateThemeToggleIcon();
            updateIcons();
            updateHeart();
            // Save theme to localStorage
            localStorage.setItem('theme', body.className);
        });

        function updateThemeToggleIcon() {
            if (body.classList.contains('dark-mode')) {
                themeToggleBtn.textContent = '☽'; 
            } else {
                themeToggleBtn.textContent = '☀️'; 
            }
        }

        function updateIcons() {
            const mode = body.classList.contains('dark-mode') ? 'dark' : 'light';
            linkedinIcon.src = `/ln-${mode}.png`;
            githubIcon.src = `/github-${mode}.png`;
            resumeIcon.src = `/resume-${mode}.png`;
        }

        function updateHeart() {
            heart.textContent = body.classList.contains('dark-mode') ? '🤍' : '🖤';
        }

        updateThemeToggleIcon();
        updateIcons();
        updateHeart();
    </script>
</body>
</html>
